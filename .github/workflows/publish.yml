name: Publish Scorer Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "common/**"
      - "agora-scorer-compiled/**"
      - "docs/**"
      - "README.md"
      - "schema/**"
      - "bin/**"
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish.yml"
      - "scripts/**"

concurrency:
  group: scorer-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GHCR_NAMESPACE: moleculeprotocol
  OFFICIAL_RUNTIME_PROFILE_ID: official_compiled_runtime

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Reject retired scorer vocabulary
        run: |
          scan_targets=(README.md docs common agora-scorer-compiled scripts bin src test package.json .github)
          if [ -d examples ]; then
            scan_targets+=(examples)
          fi

          if grep -R -n -F -f scripts/retired-vocabulary.txt --exclude=retired-vocabulary.txt --exclude-dir=.git "${scan_targets[@]}"; then
            echo "Retired scorer vocabulary found. Next step: route scorer vocabulary to Agora main capability discovery instead of reintroducing stale public image terms." >&2
            exit 1
          fi

      - name: Install replay receiver dependencies
        run: npm ci

      - name: Run replay receiver tests
        run: npm test

      - name: Run replay package boundary check
        run: npm run check:replay-boundary

      - name: Run release provenance check
        run: npm run check:release-provenance

      - name: Run scorer regression tests
        run: bash scripts/run-scorer-tests.sh

      - name: Run container guard
        run: node scripts/check-scorer-containers.mjs

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agora-scorer-compiled
            dockerfile: agora-scorer-compiled/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read runtime contract metadata
        id: contract-metadata
        run: |
          runtime_manifest_schema_sha256="$(sha256sum schema/scorer-runtime-manifest.canonical.schema.json | cut -d ' ' -f1)"
          recorded_schema_sha256="$(cut -d ' ' -f1 schema/scorer-runtime-manifest.canonical.sha256)"
          if [ "$runtime_manifest_schema_sha256" != "$recorded_schema_sha256" ]; then
            echo "Canonical runtime manifest schema hash mismatch. Next step: revendor the Agora main artifact and update schema/scorer-runtime-manifest.canonical.sha256." >&2
            exit 1
          fi

          {
            echo "runtime_manifest_schema_sha256=${runtime_manifest_schema_sha256}"
            echo "supported_program_abi_versions=python-v1"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.name }}
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:latest
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:sha-${{ github.sha }}
          labels: |
            agora.runtime-manifest-schema-sha256=${{ steps.contract-metadata.outputs.runtime_manifest_schema_sha256 }}
            agora.python-program-abi=${{ steps.contract-metadata.outputs.supported_program_abi_versions }}

      - name: Attest ${{ matrix.name }} image provenance
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Export release metadata
        run: |
          if [ -z "${{ steps.build-push.outputs.digest }}" ]; then
            echo "Missing build digest output. Next step: verify docker/build-push-action emitted the canonical digest and retry." >&2
            exit 1
          fi

          cat <<EOF > official-runtime-release.json
          {
            "profile_id": "${{ env.OFFICIAL_RUNTIME_PROFILE_ID }}",
            "image": "ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}",
            "image_ref": "ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}@${{ steps.build-push.outputs.digest }}",
            "digest": "${{ steps.build-push.outputs.digest }}",
            "tags": ["latest", "sha-${{ github.sha }}"],
            "platforms": ["linux/amd64", "linux/arm64"],
            "runtime_manifest_schema_sha256": "${{ steps.contract-metadata.outputs.runtime_manifest_schema_sha256 }}",
            "supported_program_abi_versions": ["${{ steps.contract-metadata.outputs.supported_program_abi_versions }}"],
            "provenance": {
              "predicate_type": "https://slsa.dev/provenance/v1",
              "subject_name": "ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}",
              "subject_digest": "${{ steps.build-push.outputs.digest }}",
              "source_repository": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_commit": "${{ github.sha }}",
              "signer_workflow": "${{ github.repository }}/.github/workflows/publish.yml",
              "attestation_id": "${{ steps.attest.outputs['attestation-id'] }}",
              "attestation_url": "${{ steps.attest.outputs['attestation-url'] }}"
            },
            "commit": "${{ github.sha }}",
            "build_time": "${{ steps.contract-metadata.outputs.build_time }}"
          }
          EOF
          cat official-runtime-release.json

      - name: Upload release artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: official-runtime-release-${{ matrix.name }}
          path: official-runtime-release.json
          retention-days: 90
