name: Publish Scorer Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "common/**"
      - "agora-scorer-compiled/**"
      - "examples/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/publish.yml"
      - "scripts/**"

concurrency:
  group: scorer-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: moleculeprotocol
  OFFICIAL_RUNTIME_PROFILE_ID: official_compiled_runtime

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run scorer regression tests
        run: bash scripts/run-scorer-tests.sh

      - name: Run container guard
        run: node scripts/check-scorer-containers.mjs

  publish:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agora-scorer-compiled
            dockerfile: agora-scorer-compiled/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.name }}
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:latest
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:sha-${{ github.sha }}

      - name: Export release metadata
        run: |
          if [ -z "${{ steps.build-push.outputs.digest }}" ]; then
            echo "Missing build digest output. Next step: verify docker/build-push-action emitted the canonical digest and retry." >&2
            exit 1
          fi

          cat <<EOF > official-runtime-release.json
          {
            "profile_id": "${{ env.OFFICIAL_RUNTIME_PROFILE_ID }}",
            "image": "ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}",
            "image_ref": "ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}@${{ steps.build-push.outputs.digest }}",
            "digest": "${{ steps.build-push.outputs.digest }}",
            "tags": ["latest", "sha-${{ github.sha }}"],
            "platforms": ["linux/amd64", "linux/arm64"],
            "commit": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat official-runtime-release.json

      - name: Upload release artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: official-runtime-release-${{ matrix.name }}
          path: official-runtime-release.json
          retention-days: 90
